<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação SAEP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <span>SAEP</span>
    <button class="ativo"  onclick="irPara('tarefas')">Tarefas</button>
    <button onclick="irPara('usuarios')">Usuários</button>
    <button onclick="irPara('nova-tarefa')">Nova Tarefa</button>
  </nav>
   
  <div id="pagina-tarefas" class="pagina ativo">
    <h2>Gerenciamento de Tarefas</h2>
    <div class="kanban">
      <div class="coluna col-afazer">
        <div class="coluna-titulo">A Fazer <span id="count-afazer">0</span></div>
        <div class="coluna-cards" id="cards-afazer"></div>
      </div>
      <div class="coluna col-fazendo">
        <div class="coluna-titulo">Fazendo <span id="count-fazendo">0</span></div>
        <div class="coluna-cards" id="cards-fazendo"></div>
      </div>
      <div class="coluna col-pronto">
        <div class="coluna-titulo">Pronto <span id="count-pronto">0</span></div>
        <div class="coluna-cards" id="cards-pronto"></div>
      </div>
    </div>
  </div>
   
  <div id="pagina-usuarios" class="pagina">
    <h2>Cadastro de Usuários</h2>
    <div class="caixa">
      <div id="msg-usuario-ok"   class="msg-sucesso">Usuário cadastrado com sucesso!</div>
      <div id="msg-usuario-erro" class="msg-erro"></div>
      <div class="campo">
        <label>Nome:</label>
        <input type="text" id="u-nome" placeholder="Nome completo"/>
      </div>
      <div class="campo">
        <label>E-mail:</label>
        <input type="email" id="u-email" placeholder="email@exemplo.com"/>
      </div>
      <button class="btn btn-salvar" onclick="salvarUsuario()">Salvar</button>
    </div>
   
    <h2>Usuários Cadastrados</h2>
    <table>
      <thead><tr><th>ID</th><th>Nome</th><th>E-mail</th><th>Ação</th></tr></thead>
      <tbody id="lista-usuarios"></tbody>
    </table>
  </div>
   
  <div id="pagina-nova-tarefa" class="pagina">
    <h2 id="titulo-form-tarefa">Cadastro de Tarefa</h2>
    <div class="caixa">
      <input type="hidden" id="t-id"/>
      <div id="msg-tarefa-ok"   class="msg-sucesso">Tarefa salva com sucesso!</div>
      <div id="msg-tarefa-erro" class="msg-erro"></div>
      <div class="campo">
        <label>Descrição:</label>
        <textarea id="t-desc" placeholder="Descreva a tarefa..."></textarea>
      </div>
      <div class="campo">
        <label>Usuário Responsável:</label>
        <select id="t-usuario"><option value="">Selecione um usuário...</option></select>
      </div>
      <div class="campo">
        <label>Setor:</label>
        <input type="text" id="t-setor" placeholder="Ex: Produção"/>
      </div>
      <div class="campo">
        <label>Prioridade:</label>
        <select id="t-prioridade">
          <option value="">Selecione...</option>
          <option value="baixa">Baixa</option>
          <option value="media">Média</option>
          <option value="alta">Alta</option>
        </select>
      </div>
      <div class="campo">
        <label>Status:</label>
        <select id="t-status">
          <option value="a fazer">A Fazer</option>
          <option value="fazendo">Fazendo</option>
          <option value="pronto">Pronto</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-salvar"   onclick="salvarTarefa()">Salvar</button>
        <button class="btn btn-cancelar" onclick="limparFormTarefa()">Limpar</button>
      </div>
    </div>
  </div>
   
  <div class="modal-fundo" id="modal-editar">
    <div class="modal-caixa">
      <h3>Editar Tarefa</h3>
      <div id="msg-editar-erro" class="msg-erro"></div>
      <input type="hidden" id="me-id"/>
      <div class="campo"><label>Descrição:</label><textarea id="me-desc"></textarea></div>
      <div class="campo"><label>Usuário:</label><select id="me-usuario"></select></div>
      <div class="campo"><label>Setor:</label><input type="text" id="me-setor"/></div>
      <div class="campo">
        <label>Prioridade:</label>
        <select id="me-prioridade">
          <option value="baixa">Baixa</option>
          <option value="media">Média</option>
          <option value="alta">Alta</option>
        </select>
      </div>
      <div class="campo">
        <label>Status:</label>
        <select id="me-status">
          <option value="a fazer">A Fazer</option>
          <option value="fazendo">Fazendo</option>
          <option value="pronto">Pronto</option>
        </select>
      </div>
      <div class="modal-acoes">
        <button class="btn btn-cancelar" onclick="fecharModal('modal-editar')">Cancelar</button>
        <button class="btn btn-salvar"   onclick="atualizarTarefa()">Salvar</button>
      </div>
    </div>
  </div>
   
  <div class="modal-fundo" id="modal-confirmar">
    <div class="modal-caixa" style="max-width:360px">
      <h3>Confirmar Exclusão</h3>
      <p>Tem certeza que deseja excluir esta tarefa?</p>
      <input type="hidden" id="id-excluir"/>
      <div class="modal-acoes">
        <button class="btn btn-cancelar" onclick="fecharModal('modal-confirmar')">Não</button>
        <button class="btn btn-excluir"  onclick="excluirTarefa()">Sim, excluir</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
